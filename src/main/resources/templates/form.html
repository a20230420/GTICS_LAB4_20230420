<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario</title>
</head>
<body>
<h2 th:text="'Nuevo empleado'"></h2>
<p th:if="${error}" th:text="${error}" style="color:red;"></p>
<form method="post" th:action="@{/employee/save}" th:object="${employeeForm}">
    <input type="hidden" th:field="*{employeeId}">
    <label>Nombre:</label>
    <input type="text" th:field="*{firstName}"><br><br>
    <label>Apellido:</label>
    <input type="text" th:field="*{lastName}"><br><br>
    <label>Email:</label>
    <input type="text" th:field="*{email}"><br><br>
    <label>Salario:</label>
    <input type="number" step="0.01" th:field="*{salary}"><br><br>
    <label>Departamento:</label>
    <select th:field="*{departmentId}">
        <option value="">Seleccione</option>
        <option th:each="d : ${departments}" th:value="${d.departmentId}" th:text="${d.departmentName}"></option>
    </select><br><br>
    <button type="submit" th:text="${mode == 'edit'} ? 'Actualizar' : 'Guardar'"></button>
</form>
<p>
    <a th:href="@{/employee/list}">Volver</a>
</p>
</body>
</html>
